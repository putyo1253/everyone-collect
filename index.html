<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 自動化管理システム</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 10px; border: 1px solid #ddd; vertical-align: top; }
        
        /* 自動拡張テキストエリアの設定 */
        textarea { 
            width: 95%; 
            min-height: 40px; 
            padding: 5px; 
            overflow: hidden; 
            resize: vertical; 
            border: 1px solid #ccc;
        }
        
        .marked { background-color: #fff3e0 !important; font-weight: bold; }
        .link-text { color: #3498db; text-decoration: underline; word-break: break-all; }
    </style>
</head>
<body>

<div id="app" class="container">
    <h1>🚀 装置建設進捗リスト</h1>
    
    <table>
        <thead>
            <tr><th>マーク</th><th>アイテム名</th><th>ステータス</th><th>メモ (URL可)</th></tr>
        </thead>
        <tbody>
            <tr v-for="item in sortedItems" :key="item.name" :class="{ marked: item.isMarked }">
                <td><input type="checkbox" v-model="item.isMarked" @change="save(item)"></td>
                <td>{{ item.name }}</td>
                <td>
                    <select v-model="item.status" @change="save(item)">
                        <option>未着手</option><option>製作中</option><option>完了</option>
                    </select>
                </td>
                <td>
                    <!-- 入力時はtextarea、それ以外はリンクとして表示 -->
                    <textarea 
                        v-model="item.memo" 
                        @blur="save(item)" 
                        @input="autoResize"
                        placeholder="メモやURLを入力...">
                    </textarea>
                    <div v-if="isUrl(item.memo)">
                        <a :href="item.memo" target="_blank" class="link-text">🔗 リンクを開く</a>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbya_YCNPPpi-F0VCgf0PDukdqyNnK81howAxoQVJ_Y2HFi_trjZqUWPmkahwx9rvUbL/exec";

const { createApp } = Vue;
createApp({
    data() { return { items: [] } },
    mounted() { 
        fetch(WEB_APP_URL)
        .then(r => r.json())
        .then(d => {
            this.items = d.slice(1).map(i => ({...i, isMarked: !!i.isMarked}));
        }); 
    },
    computed: {
        sortedItems() {
            return this.items.sort((a, b) => b.isMarked - a.isMarked);
        }
    },
    methods: {
        isUrl(str) {
            return str && (str.startsWith('http://') || str.startsWith('https://'));
        },
        autoResize(e) {
            e.target.style.height = 'auto';
            e.target.style.height = e.target.scrollHeight + 'px';
        },
        save(item) {
            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(item) });
        }
    }
}).mount('#app')
</script>
</body>
</html>
