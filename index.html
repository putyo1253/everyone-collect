<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 自動化管理システム</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; vertical-align: top; }
        th { background: #2c3e50; color: white; }
        textarea { width: 95%; min-height: 40px; border: 1px solid #ccc; padding: 5px; resize: vertical; display: block; }
        .marked { background-color: #fff3e0 !important; }
        .link-item { display: block; font-size: 0.85em; color: #3498db; text-decoration: underline; word-break: break-all; margin-top: 2px; }
    </style>
</head>
<body>

<div id="app" class="container">
    <h1>装置建設進捗リスト</h1>
    <input v-model="search" placeholder="アイテム検索..." style="width: 100%; padding: 10px; margin-bottom: 10px;">

    <table>
        <thead>
            <tr><th>マーク</th><th>アイテム名</th><th>ステータス</th><th>メモ (URL可)</th></tr>
        </thead>
        <tbody>
            <tr v-for="item in sortedItems" :key="item.name" :class="{ marked: item.isMarked }">
                <td><input type="checkbox" v-model="item.isMarked" @change="save(item)"></td>
                <td>{{ item.name }}</td>
                <td>
                    <select v-model="item.status" @change="save(item)">
                        <option>未着手</option><option>製作中</option><option>完了</option>
                    </select>
                </td>
                <td>
                    <textarea v-model="item.memo" @blur="save(item)" @input="autoResize" placeholder="メモやURLを入力..."></textarea>
                    <div v-for="url in extractUrls(item.memo)" :key="url">
                        <a :href="url" target="_blank" class="link-item">🔗 {{ url.substring(0, 30) }}...</a>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbya_YCNPPpi-F0VCgf0PDukdqyNnK81howAxoQVJ_Y2HFi_trjZqUWPmkahwx9rvUbL/exec";

const { createApp } = Vue;
createApp({
    data() { return { items: [], search: '' } },
    mounted() { 
        fetch(WEB_APP_URL)
        .then(r => r.json())
        .then(d => { this.items = d; }); 
    },
    computed: {
        sortedItems() {
            return this.items
                .filter(i => i.name.toLowerCase().includes(this.search.toLowerCase()))
                .sort((a, b) => b.isMarked - a.isMarked);
        }
    },
    methods: {
        // メモからURLを抽出する関数
        extractUrls(str) {
            if (!str) return [];
            // httpかhttpsで始まり、スペースや改行以外の文字が続くものを抽出
            const regex = /(https?:\/\/[^\s]+)/g;
            return str.match(regex) || [];
        },
        autoResize(e) {
            e.target.style.height = 'auto';
            e.target.style.height = e.target.scrollHeight + 'px';
        },
        save(item) {
            fetch(WEB_APP_URL, { 
                method: "POST", 
                body: JSON.stringify(item) 
            });
        }
    }
}).mount('#app')
</script>
</body>
</html>
